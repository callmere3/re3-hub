<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RE3 — Визитка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  background:#0e0e0e;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px calc(24px + env(safe-area-inset-bottom));
}

.card{background:#111;border-radius:20px;width:100%;max-width:420px;overflow:hidden;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.6)}

.cover{width:100%;height:220px;background:linear-gradient(160deg,#1a1230 0%,#0e0e0e 100%);position:relative;overflow:hidden}
.cover-img{width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block}
.cover-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(14,14,14,0) 30%,rgba(14,14,14,.85) 80%,rgba(14,14,14,1) 100%)}
.cover-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:800;color:rgba(255,255,255,.08);letter-spacing:-2px}

.body{padding:0 24px 28px;margin-top:-32px;position:relative}
.name{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.6px;margin-bottom:4px;line-height:1.1}
.role{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;letter-spacing:.6px;text-transform:uppercase;padding-top:6px;margin-bottom:8px}
.bio{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:22px;border-top:1px solid rgba(255,255,255,.07);padding-top:16px}

.social-links{display:flex;flex-direction:column;gap:0}
.social-block{display:flex;flex-direction:column;gap:6px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06)}
.social-block:last-child{border-bottom:none;padding-bottom:0}
.net-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.slink{display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;font-weight:400;letter-spacing:.2px}
.slink:hover{color:#fff}

.qr-box-static{display:flex;justify-content:center;margin-top:10px}
.qr-box-static img{width:120px;height:120px;object-fit:cover;border-radius:10px}

.loading{text-align:center;padding:60px 0;color:rgba(255,255,255,.3);font-size:13px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#9b3030;opacity:.3;animation:pulse 1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="loading">
    <div style="margin-bottom:12px">
      <span class="dot"></span>
      <span class="dot" style="margin:0 4px"></span>
      <span class="dot"></span>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbxWaVLP8OUKgyse3dptdWcncHD4nMKF6MIMtYQguTqfbInNyV2trHD51XuS_RYLACbq/exec';

function render(h){
  var initials=(h.name||'RE3').toUpperCase();
  var coverHtml=h.photo
    ?'<img class="cover-img" src="'+h.photo+'" alt=""><div class="cover-gradient"></div>'
    :'<div class="cover-initials">'+initials+'</div>';

  var links='';
  if(h.ig){
    var igQr=h['ig-qr']?'<img src="'+h['ig-qr']+'" alt="IG QR">':'';
    links+='<div class="social-block">'+
      '<div class="net-label">Instagram</div>'+
      '<a class="slink" href="'+h.ig+'" target="_blank">'+h.ig.replace(/https?:\/\/(www\.)?/,'')+'</a>'+
      (igQr?'<div class="qr-box-static">'+igQr+'</div>':'')+
      '</div>';
  }
  if(h.tg){
    var tgQr=h['tg-qr']?'<img src="'+h['tg-qr']+'" alt="TG QR">':'';
    links+='<div class="social-block">'+
      '<div class="net-label">Telegram</div>'+
      '<a class="slink" href="'+h.tg+'" target="_blank">'+h.tg.replace(/https?:\/\//,'')+'</a>'+
      (tgQr?'<div class="qr-box-static">'+tgQr+'</div>':'')+
      '</div>';
  }

  var bioHtml=h.bio?'<div class="bio">'+h.bio+'</div>':'';

  document.getElementById('card').innerHTML=
    '<div class="cover">'+coverHtml+'</div>'+
    '<div class="body">'+
    '<div class="name">'+(h.name||'RE3')+'</div>'+
    '<div class="role">'+(h.role||'')+'</div>'+
    bioHtml+
    '<div class="social-links">'+links+'</div>'+
    '</div>';

  document.title=(h.name||'RE3')+' — Визитка';
}

fetch(SCRIPT_URL+'?key=re3_home')
  .then(function(r){return r.text();})
  .then(function(t){
    try{
      var data=JSON.parse(t);
      if(data && data.name){
        render(data);
        /* DEBUG: раскомментируй чтобы увидеть что пришло из Apps Script
        var dbg=document.createElement('pre');
        dbg.style.cssText='font-size:10px;color:rgba(255,255,255,.3);padding:12px;word-break:break-all;white-space:pre-wrap';
        dbg.textContent=JSON.stringify(data,null,2);
        document.body.appendChild(dbg);
        */
      } else throw new Error('no data');
    } catch(e){
      render({name:'RE3',role:'Music Producer · Mixing engineer · Artist',bio:'Credits: Люся Чеботина, Jakone, TATAR, mzlff, СТС, ТНТ',ig:'https://www.instagram.com/re3_music',tg:'https://t.me/re3_music',photo:'https://callmere3.github.io/re3-hub/photo.jpg','ig-qr':'https://callmere3.github.io/re3-hub/qr-ig.png','tg-qr':'https://callmere3.github.io/re3-hub/qr-tg.png'});
    }
  })
  .catch(function(){
    render({name:'RE3',role:'Music Producer · Mixing engineer · Artist',bio:'Credits: Люся Чеботина, Jakone, TATAR, mzlff, СТС, ТНТ',ig:'https://www.instagram.com/re3_music',tg:'https://t.me/re3_music',photo:'https://callmere3.github.io/re3-hub/photo.jpg','ig-qr':'https://callmere3.github.io/re3-hub/qr-ig.png','tg-qr':'https://callmere3.github.io/re3-hub/qr-tg.png'});
  });
</script>
</body>
</html>
